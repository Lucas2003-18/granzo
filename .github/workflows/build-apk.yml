name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências e build
        run: |
          npm install
          npm run build

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          accept-android-sdk-licenses: true

      - name: Instalar build tools
        run: sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: Adicionar e sincronizar Capacitor Android
        run: |
          npm install @capacitor/android
          npx cap add android || true
          npx cap sync android

      - name: Gerar ícone do app
        run: |
          pip install Pillow -q
          python3 - <<'PYEOF'
from PIL import Image, ImageDraw, ImageFont
import os, math

def make_icon(size):
    img = Image.new('RGB', (size, size), (8, 14, 29))
    d = ImageDraw.Draw(img)
    pad = size * 0.15
    chart_bottom = size * 0.80
    chart_left = pad
    chart_right = size - pad
    chart_width = chart_right - chart_left
    bars = [0.38, 0.58, 0.46, 0.88]
    n = len(bars)
    slot = chart_width / n
    bar_w = slot * 0.52
    max_h = size * 0.50
    bar_colors = [(99,102,241),(74,222,128),(99,102,241),(74,222,128)]
    bar_centers = []
    for i,(h_pct,color) in enumerate(zip(bars,bar_colors)):
        x = chart_left + i*slot + (slot-bar_w)/2
        bar_h = max_h * h_pct
        y_top = chart_bottom - bar_h
        r = bar_w * 0.3
        d.rounded_rectangle([x,y_top,x+bar_w,chart_bottom], radius=r, fill=(*color,255))
        bar_centers.append(x + bar_w/2)
    lw = max(2, size//52)
    line_pts = [(bar_centers[i], chart_bottom - max_h*bars[i] - size*0.04) for i in range(n)]
    for i in range(n-1):
        d.line([line_pts[i],line_pts[i+1]], fill=(248,113,113), width=lw)
    dot_r = max(3, size//44)
    for px,py in line_pts:
        d.ellipse([px-dot_r,py-dot_r,px+dot_r,py+dot_r], fill=(248,113,113))
    font_size = max(10, int(size*0.18))
    try:
        font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", font_size)
    except:
        font = ImageFont.load_default()
    text = "R$"
    bbox = d.textbbox((0,0), text, font=font)
    tw = bbox[2]-bbox[0]
    d.text(((size-tw)/2+2, size*0.05+2), text, fill=(0,0,0,120), font=font)
    d.text(((size-tw)/2, size*0.05), text, fill=(167,139,250), font=font)
    d.line([(int(pad),int(chart_bottom)),(int(size-pad),int(chart_bottom))], fill=(255,255,255,30), width=max(1,size//128))
    mask = Image.new('L',(size,size),0)
    md = ImageDraw.Draw(mask)
    md.rounded_rectangle([0,0,size-1,size-1], radius=int(size*0.20), fill=255)
    result = Image.new('RGBA',(size,size),(0,0,0,0))
    result.paste(img, mask=mask)
    return result

sizes = {
    "mipmap-mdpi":    48,
    "mipmap-hdpi":    72,
    "mipmap-xhdpi":   96,
    "mipmap-xxhdpi":  144,
    "mipmap-xxxhdpi": 192,
}
base = "android/app/src/main/res"
for folder, sz in sizes.items():
    path = f"{base}/{folder}"
    os.makedirs(path, exist_ok=True)
    icon = make_icon(sz)
    # Salvar como PNG com fundo sólido (sem transparência — Android launcher)
    bg = Image.new('RGB', (sz, sz), (8, 14, 29))
    bg.paste(icon, mask=icon.split()[3])
    bg.save(f"{path}/ic_launcher.png")
    bg.save(f"{path}/ic_launcher_round.png")
    print(f"  {folder}: {sz}x{sz}")

# Foreground para adaptive icon (sem fundo, área segura 72/108)
fg_sizes = {
    "mipmap-mdpi":    108,
    "mipmap-hdpi":    162,
    "mipmap-xhdpi":   216,
    "mipmap-xxhdpi":  324,
    "mipmap-xxxhdpi": 432,
}
for folder, sz in fg_sizes.items():
    path = f"{base}/{folder}"
    os.makedirs(path, exist_ok=True)
    icon = make_icon(sz)
    icon.save(f"{path}/ic_launcher_foreground.png")

print("Ícones gerados com sucesso!")
PYEOF


      - name: Configurar adaptive icon XML
        run: |
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XML'
<?xml version="1.0" encoding="utf-8"?>
<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
    <background android:drawable="@color/ic_launcher_background"/>
    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
</adaptive-icon>
XML
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'XML'
<?xml version="1.0" encoding="utf-8"?>
<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
    <background android:drawable="@color/ic_launcher_background"/>
    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
</adaptive-icon>
XML
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/ic_launcher_background.xml << 'XML'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="ic_launcher_background">#080e1d</color>
</resources>
XML
          echo "Adaptive icon configurado"

      - name: Configurar Gradle
        run: |
          echo "org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --no-parallel --max-workers=2
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1536m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-financeiro-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
