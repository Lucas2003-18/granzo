name: Build Granzo APK + AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias e build
        run: |
          npm install
          npm run build

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          accept-android-sdk-licenses: true

      - name: Instalar build tools
        run: sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: Adicionar e sincronizar Capacitor Android
        run: |
          npm install @capacitor/android
          npx cap add android || true
          npx cap sync android

      - name: Gerar icone do app
        run: |
          pip install Pillow -q
          python3 generate_icons.py

      - name: Configurar adaptive icon XML
        run: |
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/values
          printf '<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@color/ic_launcher_background"/>\n    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>\n</adaptive-icon>\n' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="ic_launcher_background">#080e1d</color>\n</resources>\n' > android/app/src/main/res/values/ic_launcher_background.xml

      - name: Decodificar keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/granzo-release.jks

      - name: Configurar Gradle
        run: |
          # Propriedades de performance
          echo "org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          # Credenciais de assinatura via gradle.properties (jeito oficial)
          echo "GRANZO_STORE_FILE=granzo-release.jks" >> android/gradle.properties
          echo "GRANZO_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "GRANZO_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> android/gradle.properties
          echo "GRANZO_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties

      - name: Injetar signingConfig no build.gradle
        run: |
          python3 - << 'PYEOF'
          with open("android/app/build.gradle", "r") as f:
              src = f.read()

          # Só injeta se ainda não tiver
          if "GRANZO_STORE_FILE" not in src:
              inject = '''
              signingConfigs {
                  release {
                      def props = new Properties()
                      def propsFile = rootProject.file("gradle.properties")
                      if (propsFile.exists()) { props.load(propsFile.newDataInputStream()) }
                      storeFile file(props.getProperty("GRANZO_STORE_FILE", "granzo-release.jks"))
                      storePassword props.getProperty("GRANZO_STORE_PASSWORD", "")
                      keyAlias props.getProperty("GRANZO_KEY_ALIAS", "granzo")
                      keyPassword props.getProperty("GRANZO_KEY_PASSWORD", "")
                  }
              }
          '''
              src = src.replace("    buildTypes {", inject + "    buildTypes {", 1)
              src = src.replace(
                  "        release {\n",
                  "        release {\n            signingConfig signingConfigs.release\n",
                  1
              )
              with open("android/app/build.gradle", "w") as f:
                  f.write(src)
              print("signingConfig injetado")
          else:
              print("signingConfig ja existe")
          PYEOF

      - name: Build APK release assinado
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --no-parallel --max-workers=2
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1536m"

      - name: Build AAB release assinado (Play Store)
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --no-parallel --max-workers=2
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1536m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: granzo-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: granzo-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
