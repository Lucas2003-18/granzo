name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: meu-financeiro  # <- entra na subpasta automaticamente

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências e build
        run: |
          npm install
          npm run build

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          accept-android-sdk-licenses: true

      - name: Instalar build tools e plataforma Android
        run: |
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: Adicionar e sincronizar Capacitor Android
        run: |
          npm install @capacitor/android
          npx cap add android || true
          npx cap sync android

      - name: Configurar Gradle
        run: |
          cat >> android/gradle.properties << 'GRADLE'
          org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m
          org.gradle.daemon=false
          org.gradle.parallel=false
          android.useAndroidX=true
          android.enableJetifier=true
          GRADLE

      - name: Build APK
        working-directory: meu-financeiro/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --no-parallel --max-workers=2
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1536m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-financeiro-apk
          path: meu-financeiro/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
