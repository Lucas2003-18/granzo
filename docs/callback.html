<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conectando ao Granzo...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080e1d;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:40px 32px;max-width:360px}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#6095FF;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
h2{font-size:18px;font-weight:700;margin-bottom:8px}
p{font-size:14px;color:#94a3b8;line-height:1.6}
.ok{color:#4ade80}
.err{color:#f87171}
a{color:#6095FF;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="spinner" id="spinner"></div>
  <h2 id="title">Conectando...</h2>
  <p id="msg">Redirecionando de volta para o Granzo</p>
</div>
<script>
(function(){
  var hash = window.location.hash;
  var title = document.getElementById('title');
  var msg = document.getElementById('msg');
  var spinner = document.getElementById('spinner');

  if (!hash || hash.indexOf('access_token') === -1) {
    spinner.style.display = 'none';
    title.textContent = 'Erro na autenticação';
    title.className = 'err';
    msg.textContent = 'Token não encontrado. Volte ao app e tente novamente.';
    return;
  }

  // Extrai o token
  var params = new URLSearchParams(hash.substring(1));
  var token = params.get('access_token');

  if (!token) {
    spinner.style.display = 'none';
    title.textContent = 'Erro na autenticação';
    title.className = 'err';
    msg.textContent = 'Token inválido. Volte ao app e tente novamente.';
    return;
  }

  // Tenta abrir o app via deep link
  var deepLink = 'app.granzo.finance://oauth?token=' + encodeURIComponent(token);

  // Fallback: se o deep link não funcionar em 2s, mostra o token pra copiar
  var fallbackTimer = setTimeout(function(){
    spinner.style.display = 'none';
    title.textContent = '✓ Autenticado!';
    title.className = 'ok';
    msg.innerHTML = 'Se o app não abriu automaticamente:<br><br>' +
      '1. Abra o Granzo<br>' +
      '2. Vá em ⚙️ Config → ☁️ Drive<br>' +
      '3. O app vai detectar a conexão automaticamente<br><br>' +
      '<small style="color:#475569">Ou copie o token manualmente:</small><br>' +
      '<input readonly value="' + token + '" style="width:100%;margin-top:8px;padding:8px;background:#0e1020;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e2e8f0;font-size:11px;font-family:monospace" onclick="this.select()"/>';
  }, 2500);

  // Salva token no localStorage (funciona se estiver no mesmo domínio)
  try { localStorage.setItem('mf_gdrive_token', token); } catch(e){}

  // Tenta deep link
  window.location.href = deepLink;
})();
</script>
</body>
</html>
